url: https://ejanalysis.github.io/census2020download/
template:
  bootstrap: 5
reference:
- title: "Key Functions"
  contents:
  - census2020_get_data
  - census2020_save_datasets
- title: "Block data tables (created at run time, not bundled)"
  desc: >
    These data.tables are produced by census2020_save_datasets() for the EJAM
    package; they are documented here but are not shipped with this package.
  contents:
  - bgid2fips
  - blockid2fips
  - blockpoints
  - blockwts
  - quaddata
- title: internal
  contents:
  - starts_with("census2020")
  - add_block_radius_miles_to_dt
  - lookup_states
  - area_sqmi_from_area_sqmeters
  - census_col_names_map
  - radius_miles_from_area_sqmi
  - starts_with("census_col_names_map_")
